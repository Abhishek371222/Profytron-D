name: Security Scanning

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  schedule:
    - cron: '0 2 * * *'  # Daily at 2 AM UTC

permissions:
  contents: read
  security-events: write
  pull-requests: read

jobs:
  trivy-fs:
    runs-on: ubuntu-latest
    name: Trivy Filesystem Scan
    steps:
      - uses: actions/checkout@v4

      - name: Run Trivy filesystem scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'sarif'
          output: 'trivy-fs.sarif'
          severity: 'CRITICAL,HIGH'

      - name: Upload to GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: 'trivy-fs.sarif'

  trivy-docker:
    runs-on: ubuntu-latest
    name: Trivy Docker Image Scan
    steps:
      - uses: actions/checkout@v4

      - name: Build API image for scanning
        run: docker build -t profytron-api:test -f apps/api/Dockerfile .

      - name: Run Trivy image scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'profytron-api:test'
          format: 'sarif'
          output: 'trivy-docker.sarif'
          severity: 'CRITICAL,HIGH'

      - name: Upload to GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: 'trivy-docker.sarif'

  dependency-check:
    runs-on: ubuntu-latest
    name: Dependency Vulnerability Check
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Run npm audit
        run: npm audit --audit-level=moderate
        continue-on-error: true

      - name: Run pnpm audit
        run: pnpm audit --audit-level=moderate
        continue-on-error: true

  codeql:
    runs-on: ubuntu-latest
    name: CodeQL Analysis
    strategy:
      fail-fast: false
      matrix:
        language: ['javascript', 'typescript']
    steps:
      - uses: actions/checkout@v4

      - uses: github/codeql-action/init@v3
        with:
          languages: ${{ matrix.language }}

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm --dir apps/api exec prisma generate

      - run: pnpm build

      - uses: github/codeql-action/analyze@v3

  secret-scanning:
    runs-on: ubuntu-latest
    name: Secret Detection
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # Note: do NOT pin base/head here. On a push to the default branch the
      # action resolves base == head (same commit) and exits with the fatal
      # "BASE and HEAD commits are the same" error. Omitting them lets the action
      # pick the correct diff (or full scan), and --only-verified avoids failing
      # the build on placeholder/example strings.
      - name: TruffleHog Secret Scan
        uses: trufflesecurity/trufflehog@main
        with:
          extra_args: --only-verified

  sast-semgrep:
    runs-on: ubuntu-latest
    name: Semgrep SAST Analysis
    container:
      image: returntocorp/semgrep
    steps:
      - uses: actions/checkout@v4

      - name: Run Semgrep
        run: |
          semgrep --config=p/security-audit \
                  --config=p/owasp-top-ten \
                  --config=p/typescript \
                  --sarif \
                  --output=semgrep-results.sarif \
                  apps/
        continue-on-error: true

      - name: Upload Semgrep results
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: 'semgrep-results.sarif'
        if: always()
