apiVersion: apps/v1
kind: Deployment
metadata:
  name: profytron-api
  namespace: profytron
  labels:
    app: profytron-api
spec:
  replicas: 3
  selector:
    matchLabels:
      app: profytron-api
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0      # zero-downtime rollout
      maxSurge: 1
  template:
    metadata:
      labels:
        app: profytron-api
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: api
          image: ghcr.io/YOUR_ORG/profytron-api:latest   # set by CD pipeline
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 4000
          envFrom:
            - secretRef:
                name: profytron-api-env
          env:
            - name: API_HOST
              value: "0.0.0.0"
            - name: API_PORT
              value: "4000"
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          # Writable mounts (root FS is read-only for security).
          volumeMounts:
            - name: logs
              mountPath: /app/apps/api/logs
            - name: tmp
              mountPath: /tmp
          resources:
            requests:
              cpu: "250m"
              memory: "384Mi"
            limits:
              cpu: "1000m"
              memory: "768Mi"
          # ── Health probes (all hit the deep /health endpoint) ───────────────
          # startupProbe gives the app up to 60s to boot before liveness kicks in.
          startupProbe:
            httpGet:
              path: /health
              port: http
            failureThreshold: 12
            periodSeconds: 5
          # readiness: only routes traffic while DB-backed /health returns 200.
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          # liveness: restart the pod if it stops responding entirely.
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 3
          # Give in-flight work time to drain on SIGTERM (graceful shutdown).
          lifecycle:
            preStop:
              exec:
                command: ["sh", "-c", "sleep 5"]
      terminationGracePeriodSeconds: 30
      volumes:
        - name: logs
          emptyDir: {}
        - name: tmp
          emptyDir: {}
