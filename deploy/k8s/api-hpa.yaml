apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: profytron-api
  namespace: profytron
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: profytron-api
  minReplicas: 3
  maxReplicas: 20
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 65
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 75
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 30
      policies:
        - type: Percent
          value: 100
          periodSeconds: 30
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
        - type: Percent
          value: 50
          periodSeconds: 60
