# TEMPLATE ONLY — do NOT commit real values. Create the real Secret out-of-band:
#
#   kubectl -n profytron create secret generic profytron-api-env \
#     --from-env-file=apps/api/.env.production
#
# or manage it with a sealed-secret / external-secrets operator backed by a
# cloud secret manager (AWS Secrets Manager, GCP Secret Manager, Vault).
apiVersion: v1
kind: Secret
metadata:
  name: profytron-api-env
  namespace: profytron
type: Opaque
stringData:
  NODE_ENV: production
  DATABASE_URL: "postgresql://USER:PASSWORD@HOST:5432/DB?sslmode=require"
  REDIS_URL: "rediss://default:TOKEN@HOST:6379"
  JWT_ACCESS_SECRET: "REPLACE_WITH_64_CHAR_SECRET"
  JWT_REFRESH_SECRET: "REPLACE_WITH_DIFFERENT_64_CHAR_SECRET"
  AES_MASTER_KEY: "REPLACE_WITH_64_HEX_CHARS"
  CORS_ORIGIN: "https://app.profytron.com"
  FRONTEND_URL: "https://app.profytron.com"
  STRIPE_SECRET_KEY: "sk_live_REPLACE"
  STRIPE_WEBHOOK_SECRET: "whsec_REPLACE"
  # Optional observability
  OTEL_EXPORTER_OTLP_ENDPOINT: "http://otel-collector.observability:4318"
  SENTRY_DSN: ""
