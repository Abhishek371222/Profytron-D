# Redis Sentinel configuration for Profytron HA (see docker-compose.ha.yml).
# Monitors the primary and promotes a replica on failure. `quorum 2` means 2 of
# the 3 sentinels must agree the primary is down before failover.
port 26379
sentinel resolve-hostnames yes
sentinel announce-hostnames yes

sentinel monitor profymaster redis-primary 6379 2
sentinel down-after-milliseconds profymaster 5000
sentinel failover-timeout profymaster 10000
sentinel parallel-syncs profymaster 1
