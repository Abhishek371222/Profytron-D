# Load balancer for the scalable Profytron API cluster (docker-compose.prod.yml).
# Uses Docker's embedded DNS resolver so `--scale api=N` is picked up per-request
# (round-robin across all healthy replicas) without an nginx reload.

map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

server {
    listen 80;
    server_name _;

    # Docker embedded DNS. valid=5s re-resolves the `api` service regularly.
    resolver 127.0.0.11 valid=5s ipv6=off;

    client_max_body_size 10m;

    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css application/json application/javascript application/xml+rss image/svg+xml;

    # Health passthrough for external uptime checks.
    location = /health {
        set $api_upstream http://api:4000;
        proxy_pass $api_upstream;
    }

    location / {
        # Variable upstream forces per-request DNS resolution → load-balances
        # across all `api` replicas as they scale up/down.
        set $api_upstream http://api:4000;
        proxy_pass $api_upstream;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket (trading gateway) support.
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;

        proxy_connect_timeout 5s;
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
    }
}
