# =============================================================================
# Profytron EDGE reverse proxy (public-facing TLS termination)
# =============================================================================
# This sits in front of the Next.js web app and the NestJS API. It terminates
# TLS, speaks HTTP/2 + HTTP/3 (QUIC), compresses with Brotli + gzip, and adds
# HSTS + security headers.
#
# Requirements:
#   - An nginx build WITH the ngx_brotli + http_v3 modules. The stock
#     `nginx:alpine` image does NOT include Brotli. Use one of:
#       * `macbre/nginx-http3` / `ranadeeppolavarapu/nginx-http3`
#       * Build nginx with `--with-http_v3_module --add-module=ngx_brotli`
#     If Brotli is unavailable, delete the `brotli*` lines — gzip still applies.
#   - TLS certs mounted at /etc/nginx/certs/ (e.g. from cert-manager / certbot).
#
# In front of this you would typically still run Cloudflare (WAF, DDoS, bot
# protection, geo-blocking) — those live at the CDN layer, not here.
# =============================================================================

map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

# Upstreams (Docker DNS or k8s service names). Keep-Alive pools reduce latency.
upstream profytron_web {
    server web:3000;
    keepalive 64;
}
upstream profytron_api {
    server api:4000;
    keepalive 64;
}

# ── HTTP → HTTPS redirect ────────────────────────────────────────────────────
server {
    listen 80;
    listen [::]:80;
    server_name _;

    # Allow ACME HTTP-01 challenges to pass through.
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ── HTTPS (HTTP/2 + HTTP/3) ──────────────────────────────────────────────────
server {
    # HTTP/2 over TCP
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;

    # HTTP/3 over QUIC/UDP
    listen 443 quic reuseport;
    listen [::]:443 quic reuseport;

    server_name app.profytron.com;

    # ── TLS ──────────────────────────────────────────────────────────────────
    ssl_certificate     /etc/nginx/certs/fullchain.pem;
    ssl_certificate_key /etc/nginx/certs/privkey.pem;

    # TLS 1.3 only (drop 1.2 for max security; add TLSv1.2 back if you must
    # support very old clients).
    ssl_protocols TLSv1.3;
    ssl_prefer_server_ciphers off;
    ssl_session_timeout 1d;
    ssl_session_cache shared:SSL:10m;
    ssl_session_tickets off;
    ssl_stapling on;
    ssl_stapling_verify on;

    # ── Security headers ───────────────────────────────────────────────────────
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
    # Advertise HTTP/3 availability to clients.
    add_header Alt-Svc 'h3=":443"; ma=86400' always;

    # ── Compression ────────────────────────────────────────────────────────────
    # Brotli (preferred). Requires ngx_brotli — see header note.
    brotli on;
    brotli_comp_level 5;
    brotli_min_length 1024;
    brotli_types text/plain text/css application/json application/javascript
                 application/xml+rss text/javascript image/svg+xml application/wasm;

    # gzip fallback for clients without Brotli.
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 1024;
    gzip_types text/plain text/css application/json application/javascript
               application/xml+rss text/javascript image/svg+xml application/wasm;

    client_max_body_size 10m;
    keepalive_timeout 65s;

    # ── Long-cache immutable static assets (Next.js fingerprinted bundles) ─────
    location /_next/static/ {
        proxy_pass http://profytron_web;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # ── API + WebSocket ────────────────────────────────────────────────────────
    location /api/ {
        proxy_pass http://profytron_api/v1/;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;

        proxy_connect_timeout 5s;
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
    }

    # ── Socket.IO (trading gateway) ──────────────────────────────────────────
    location /socket.io/ {
        proxy_pass http://profytron_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_read_timeout 3600s;
    }

    # ── Everything else → Next.js web app ──────────────────────────────────────
    location / {
        proxy_pass http://profytron_web;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
