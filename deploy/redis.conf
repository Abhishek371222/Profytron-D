# =============================================================================
# Profytron Redis configuration (production)
# =============================================================================
# Redis backs auth sessions, refresh tokens, OTPs, rate-limit counters, caching
# AND BullMQ job queues. Because queue jobs (copy-trading, emails, notifications,
# AI) must NEVER be silently dropped, eviction is disabled and BOTH persistence
# modes are enabled so data survives a restart/crash.
# =============================================================================

bind 0.0.0.0
protected-mode yes
port 6379

# ── Memory ───────────────────────────────────────────────────────────────────
maxmemory 1gb
# noeviction: return errors instead of dropping keys. Critical — queue jobs and
# auth state must not be evicted under memory pressure.
maxmemory-policy noeviction

# ── Persistence: RDB snapshots ─────────────────────────────────────────────────
# save <seconds> <changes>
save 900 1
save 300 10
save 60 10000
rdbcompression yes
rdbchecksum yes
dbfilename dump.rdb
dir /data

# ── Persistence: AOF (append-only log) ─────────────────────────────────────────
appendonly yes
appendfilename "appendonly.aof"
# everysec = fsync once per second: best durability/throughput trade-off.
appendfsync everysec
# Rewrite the AOF when it doubles in size (and is at least 64mb).
auto-aof-rewrite-percentage 100
auto-aof-rewrite-min-size 64mb
aof-use-rdb-preamble yes

# ── Networking / clients ───────────────────────────────────────────────────────
tcp-keepalive 300
timeout 0

# ── Slow log (observability) ───────────────────────────────────────────────────
slowlog-log-slower-than 10000
slowlog-max-len 128

# ── Security ───────────────────────────────────────────────────────────────────
# Set a strong password (or inject via `--requirepass` / Docker secret). The app
# reads REDIS_PASSWORD; keep them in sync.
# requirepass CHANGE_ME_STRONG_PASSWORD
# Rename or disable dangerous commands in production.
rename-command FLUSHALL ""
rename-command FLUSHDB ""
# NOTE: do NOT disable CONFIG — BullMQ/ioredis call `CONFIG GET maxmemory-policy`
# on connect to verify eviction is safe for queues. Disabling it breaks that check.
# rename-command CONFIG ""
