# Production-style stack for Profytron's trading core.
#
#   docker compose -f docker-compose.prod.yml up -d --build
#   docker compose -f docker-compose.prod.yml up -d --scale api=4   # horizontal scale
#
# Each `api` replica is also a BullMQ worker (processors run in-process), so
# scaling `api` scales execution throughput. Master-trade polling is guarded by
# a Redis leader-lease (see MasterSyncService) so only ONE replica fans out
# copies — no duplicate executions when scaled.
#
# nginx load-balances across replicas via Docker's embedded DNS (round-robin),
# re-resolving every request so new replicas are picked up without a reload.

services:
  postgres:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-profytron}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-postgres}']
      interval: 10s
      timeout: 5s
      retries: 5
    networks: [profytron]

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --maxmemory 512mb --maxmemory-policy noeviction --appendonly yes
    volumes:
      - redisdata:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 3s
      retries: 5
    networks: [profytron]

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    restart: unless-stopped
    # No container_name and no host port binding so the service can scale.
    env_file:
      - apps/api/.env
    environment:
      NODE_ENV: production
      REDIS_HOST: redis
      REDIS_PORT: '6379'
      REDIS_URL: redis://redis:6379
    expose:
      - '4000'
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test:
        ['CMD', 'wget', '-qO-', 'http://localhost:4000/health']
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 40s
    networks: [profytron]

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    ports:
      - '8080:80'
    volumes:
      - ./deploy/nginx.prod.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - api
    networks: [profytron]

volumes:
  pgdata:
  redisdata:

networks:
  profytron:
    driver: bridge
