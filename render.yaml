# Render Blueprint for the Profytron NestJS API.
# The frontend (apps/web) stays on Vercel; this hosts the always-on backend
# (HTTP + Socket.IO WebSockets + BullMQ workers + cron pollers) that Vercel
# cannot run.
#
# How to use:
#   1. Push this file (already in the repo root).
#   2. Render Dashboard -> New -> Blueprint -> connect Abhishek371222/Profytron-D.
#   3. Render reads this file and creates the service.
#   4. Fill in the secret env vars (marked sync:false) in the dashboard.
#
# Build/run come straight from apps/api/Dockerfile (node dist/src/main, port 4000).

services:
  - type: web
    name: profytron-api
    runtime: docker
    dockerfilePath: apps/api/Dockerfile
    dockerContext: .
    branch: main
    plan: free
    region: oregon
    healthCheckPath: /health
    autoDeployTrigger: commit
    envVars:
      # --- Runtime ---
      - key: NODE_ENV
        value: production
      - key: API_PORT
        value: "4000"
      - key: API_HOST
        value: "0.0.0.0"

      # --- Public URLs ---
      # IMPORTANT: the live site is served on the www host. The apex
      # (profytron.com) only redirects "/" to www and 404s every other path,
      # so FRONTEND_URL MUST point at www or OAuth/email deep links break
      # ("Not Found" after Google login when hitting profytron.com/auth/callback).
      - key: API_PUBLIC_URL
        value: https://profytron-api.onrender.com
      - key: FRONTEND_URL
        value: https://www.profytron.com
      - key: FRONTEND_DASHBOARD_URL
        value: https://www.profytron.com/dashboard
      # Allow both hosts so requests/WebSockets from either are accepted.
      - key: CORS_ORIGIN
        value: https://www.profytron.com,https://profytron.com

      # --- Database (Neon) — set in dashboard ---
      - key: DATABASE_URL
        sync: false
      - key: DIRECT_URL
        sync: false

      # --- Redis (REQUIRED for production) ---
      # Production MUST use a real, shared Redis. The in-memory fallback is per
      # instance and breaks: BullMQ trade execution queue, Socket.IO horizontal
      # scaling, JWT blacklist, distributed locks, and refresh-token rotation
      # reuse detection. Provide an Upstash Redis wire URL as REDIS_URL
      # (Connect → Redis in the Upstash dashboard, NOT the REST https URL).
      # NOT the REST URL). Format: rediss://default:<token>@<host>:6379
      # If you only have REST vars, set UPSTASH_REDIS_REST_URL + TOKEN instead
      # (the API auto-converts to port 6379 — do NOT use https:// or :443).
      - key: REDIS_INMEMORY
        value: "false"
      - key: REDIS_URL
        sync: false

      # --- OAuth / Supabase (REQUIRED if Google/Supabase login is enabled) ---
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      # --- Telegram bot webhook (REQUIRED if Telegram integration is enabled) ---
      - key: TELEGRAM_WEBHOOK_SECRET
        sync: false

      # --- Auth secrets (REQUIRED — generate with: openssl rand -base64 64) ---
      - key: JWT_ACCESS_SECRET
        sync: false
      - key: JWT_REFRESH_SECRET
        sync: false
      - key: LEGACY_JWT_SECRET
        sync: false
      # 64 hex chars (32 bytes): node -e "console.log(require('crypto').randomBytes(32).toString('hex'))"
      - key: AES_MASTER_KEY
        sync: false

      # --- Monitoring (optional) ---
      - key: SENTRY_DSN
        sync: false

      # --- Payments (optional — set if using Stripe/Razorpay) ---
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
      - key: RAZORPAY_KEY_ID
        sync: false
      - key: RAZORPAY_KEY_SECRET
        sync: false

      # --- Email (optional) ---
      - key: RESEND_API_KEY
        sync: false

      # --- AI agents (optional) ---
      - key: OPENROUTER_API_KEY
        sync: false

      # --- Broker integration (optional — blank = mock mode) ---
      - key: METAAPI_TOKEN
        sync: false

      # --- Firebase Admin (optional — push notifications) ---
      - key: FIREBASE_PROJECT_ID
        sync: false
      - key: FIREBASE_CLIENT_EMAIL
        sync: false
      - key: FIREBASE_PRIVATE_KEY
        sync: false
