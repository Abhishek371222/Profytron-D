# Render Blueprint for the Profytron NestJS API.
# The frontend (apps/web) stays on Vercel; this hosts the always-on backend
# (HTTP + Socket.IO WebSockets + BullMQ workers + cron pollers) that Vercel
# cannot run.
#
# How to use:
#   1. Push this file (already in the repo root).
#   2. Render Dashboard -> New -> Blueprint -> connect Abhishek371222/Profytron-D.
#   3. Render reads this file and creates the service.
#   4. Fill in the secret env vars (marked sync:false) in the dashboard.
#
# Build/run come straight from apps/api/Dockerfile (node dist/src/main, port 4000).

services:
  - type: web
    name: profytron-api
    runtime: docker
    dockerfilePath: apps/api/Dockerfile
    dockerContext: .
    branch: main
    plan: free
    region: oregon
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      # --- Runtime ---
      - key: NODE_ENV
        value: production
      - key: API_PORT
        value: "4000"
      - key: API_HOST
        value: "0.0.0.0"

      # --- Public URLs (update to https://profytron.com once DNS is live) ---
      - key: API_PUBLIC_URL
        value: https://profytron-api.onrender.com
      - key: FRONTEND_URL
        value: https://profytron.com
      - key: FRONTEND_DASHBOARD_URL
        value: https://profytron.com/dashboard
      - key: CORS_ORIGIN
        value: https://profytron.com

      # --- Database (Neon) — set in dashboard ---
      - key: DATABASE_URL
        sync: false
      - key: DIRECT_URL
        sync: false

      # --- Redis ---
      # Easiest first deploy: set REDIS_INMEMORY=true (no external Redis needed).
      # Production: set REDIS_INMEMORY=false and provide the Upstash RESP/TLS URL
      # (rediss://default:<password>@<host>:6379) as REDIS_URL.
      - key: REDIS_INMEMORY
        value: "true"
      - key: REDIS_URL
        sync: false

      # --- Auth secrets (REQUIRED — generate with: openssl rand -base64 64) ---
      - key: JWT_ACCESS_SECRET
        sync: false
      - key: JWT_REFRESH_SECRET
        sync: false
      - key: LEGACY_JWT_SECRET
        sync: false
      # 64 hex chars (32 bytes): node -e "console.log(require('crypto').randomBytes(32).toString('hex'))"
      - key: AES_MASTER_KEY
        sync: false

      # --- Monitoring (optional) ---
      - key: SENTRY_DSN
        sync: false

      # --- Payments (optional — set if using Stripe/Razorpay) ---
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
      - key: RAZORPAY_KEY_ID
        sync: false
      - key: RAZORPAY_KEY_SECRET
        sync: false

      # --- Email (optional) ---
      - key: RESEND_API_KEY
        sync: false

      # --- AI agents (optional) ---
      - key: OPENROUTER_API_KEY
        sync: false

      # --- Broker integration (optional — blank = mock mode) ---
      - key: METAAPI_TOKEN
        sync: false

      # --- Firebase Admin (optional — push notifications) ---
      - key: FIREBASE_PROJECT_ID
        sync: false
      - key: FIREBASE_CLIENT_EMAIL
        sync: false
      - key: FIREBASE_PRIVATE_KEY
        sync: false
