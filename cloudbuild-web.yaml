steps:
  - name: "gcr.io/cloud-builders/docker"
    args:
      - "build"
      - "-f"
      - "apps/web/Dockerfile"
      - "--build-arg"
      - "NEXT_PUBLIC_APP_URL=${_NEXT_PUBLIC_APP_URL}"
      - "--build-arg"
      - "NEXT_PUBLIC_FRONTEND_URL=${_NEXT_PUBLIC_FRONTEND_URL}"
      - "--build-arg"
      - "NEXT_PUBLIC_API_URL=${_NEXT_PUBLIC_API_URL}"
      - "--build-arg"
      - "NEXT_PUBLIC_BACKEND_URL=${_NEXT_PUBLIC_BACKEND_URL}"
      - "--build-arg"
      - "NEXT_PUBLIC_WS_URL=${_NEXT_PUBLIC_WS_URL}"
      - "--build-arg"
      - "NEXT_PUBLIC_ENABLE_MOCK_API=${_NEXT_PUBLIC_ENABLE_MOCK_API}"
      - "--build-arg"
      - "NEXT_PUBLIC_SUPABASE_URL=${_NEXT_PUBLIC_SUPABASE_URL}"
      - "--build-arg"
      - "NEXT_PUBLIC_SUPABASE_ANON_KEY=${_NEXT_PUBLIC_SUPABASE_ANON_KEY}"
      - "--build-arg"
      - "NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY=${_NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY}"
      - "--build-arg"
      - "NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY=${_NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY}"
      - "--build-arg"
      - "NEXT_PUBLIC_RAZORPAY_KEY_ID=${_NEXT_PUBLIC_RAZORPAY_KEY_ID}"
      - "--build-arg"
      - "NEXT_PUBLIC_SENTRY_DSN=${_NEXT_PUBLIC_SENTRY_DSN}"
      - "--build-arg"
      - "NEXT_PUBLIC_FIREBASE_API_KEY=${_NEXT_PUBLIC_FIREBASE_API_KEY}"
      - "--build-arg"
      - "NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN=${_NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN}"
      - "--build-arg"
      - "NEXT_PUBLIC_FIREBASE_PROJECT_ID=${_NEXT_PUBLIC_FIREBASE_PROJECT_ID}"
      - "--build-arg"
      - "NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET=${_NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET}"
      - "--build-arg"
      - "NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID=${_NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID}"
      - "--build-arg"
      - "NEXT_PUBLIC_FIREBASE_APP_ID=${_NEXT_PUBLIC_FIREBASE_APP_ID}"
      - "--build-arg"
      - "NEXT_PUBLIC_FIREBASE_MEASUREMENT_ID=${_NEXT_PUBLIC_FIREBASE_MEASUREMENT_ID}"
      - "--build-arg"
      - "NEXT_PUBLIC_FIREBASE_LOGIN_API_KEY=${_NEXT_PUBLIC_FIREBASE_LOGIN_API_KEY}"
      - "--build-arg"
      - "NEXT_PUBLIC_FIREBASE_LOGIN_AUTH_DOMAIN=${_NEXT_PUBLIC_FIREBASE_LOGIN_AUTH_DOMAIN}"
      - "--build-arg"
      - "NEXT_PUBLIC_FIREBASE_LOGIN_PROJECT_ID=${_NEXT_PUBLIC_FIREBASE_LOGIN_PROJECT_ID}"
      - "--build-arg"
      - "NEXT_PUBLIC_FIREBASE_LOGIN_APP_ID=${_NEXT_PUBLIC_FIREBASE_LOGIN_APP_ID}"
      - "--build-arg"
      - "BACKEND_API_ORIGIN=${_BACKEND_API_ORIGIN}"
      - "-t"
      - "asia-south1-docker.pkg.dev/gen-lang-client-0497144011/profytron/web:latest"
      - "."
  # Push the freshly-built image to Artifact Registry BEFORE deploying. Without
  # this, `gcloud run deploy` below pulls whatever :latest was last pushed (the
  # `images:` push at the end only runs on full build success) — so a failure in
  # a later step (e.g. CDN invalidation) meant the new image was never pushed and
  # every deploy silently served stale code.
  - name: "gcr.io/cloud-builders/docker"
    args:
      - "push"
      - "asia-south1-docker.pkg.dev/gen-lang-client-0497144011/profytron/web:latest"
  - name: "gcr.io/google.com/cloudsdktool/cloud-sdk"
    entrypoint: "gcloud"
    args:
      - "run"
      - "deploy"
      - "web"
      - "--image=asia-south1-docker.pkg.dev/gen-lang-client-0497144011/profytron/web:latest"
      - "--region=asia-south1"
      - "--platform=managed"
      - "--memory=1Gi"
      - "--cpu=1"
      - "--min-instances=1"
      - "--max-instances=10"
      - "--set-env-vars=BACKEND_API_ORIGIN=${_BACKEND_API_ORIGIN},NEXT_PUBLIC_BACKEND_URL=${_NEXT_PUBLIC_BACKEND_URL},NEXT_PUBLIC_WS_URL=${_NEXT_PUBLIC_WS_URL}"
      - "--set-secrets=DATABASE_URL=DATABASE_URL:latest,AES_MASTER_KEY=AES_MASTER_KEY:latest,METAAPI_TOKEN=METAAPI_TOKEN:latest,OPENROUTER_API_KEY=OPENROUTER_API_KEY:latest,OPENROUTER_MODEL=OPENROUTER_MODEL:latest,NEXT_PUBLIC_SUPABASE_URL=SUPABASE_URL:latest,NEXT_PUBLIC_SUPABASE_ANON_KEY=SUPABASE_ANON_KEY:latest,NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY=SUPABASE_ANON_KEY:latest,NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY=STRIPE_PUBLISHABLE_KEY:latest,NEXT_PUBLIC_RAZORPAY_KEY_ID=RAZORPAY_KEY_ID:latest,NEXT_PUBLIC_SENTRY_DSN=SENTRY_DSN:latest,NEXT_PUBLIC_FIREBASE_API_KEY=FIREBASE_API_KEY:latest,NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN=FIREBASE_AUTH_DOMAIN:latest,NEXT_PUBLIC_FIREBASE_PROJECT_ID=FIREBASE_PROJECT_ID:latest,NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET=FIREBASE_STORAGE_BUCKET:latest,NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID=FIREBASE_MESSAGING_SENDER_ID:latest,NEXT_PUBLIC_FIREBASE_APP_ID=FIREBASE_APP_ID:latest,NEXT_PUBLIC_FIREBASE_MEASUREMENT_ID=FIREBASE_MEASUREMENT_ID:latest,NEXT_PUBLIC_FIREBASE_LOGIN_API_KEY=NEXT_PUBLIC_FIREBASE_LOGIN_API_KEY:latest,NEXT_PUBLIC_FIREBASE_LOGIN_AUTH_DOMAIN=NEXT_PUBLIC_FIREBASE_LOGIN_AUTH_DOMAIN:latest,NEXT_PUBLIC_FIREBASE_LOGIN_PROJECT_ID=NEXT_PUBLIC_FIREBASE_LOGIN_PROJECT_ID:latest,NEXT_PUBLIC_FIREBASE_LOGIN_APP_ID=NEXT_PUBLIC_FIREBASE_LOGIN_APP_ID:latest"
      - "--project=gen-lang-client-0497144011"
  # Cloud Run deploys don't invalidate Cloud CDN — without this, the edge
  # keeps serving pre-deploy HTML/JS (observed: register page cached with
  # s-maxage=31536000) regardless of how many times you redeploy.
  # allowFailure: the deploy above has already shipped the new code; a missing
  # CDN-invalidate permission must never fail the build and block the image push
  # (that's exactly what left production stuck on stale images). The cache can be
  # invalidated manually if this step can't. Grant the build's service account
  # the Compute Load Balancer Admin role to let this step succeed automatically.
  - name: "gcr.io/google.com/cloudsdktool/cloud-sdk"
    entrypoint: "gcloud"
    allowFailure: true
    args:
      - "compute"
      - "url-maps"
      - "invalidate-cdn-cache"
      - "profytron-web-urlmap"
      - "--path=/*"
      - "--async"
      - "--project=gen-lang-client-0497144011"
options:
  logging: CLOUD_LOGGING_ONLY
  machineType: "E2_HIGHCPU_8"
timeout: "1800s"
